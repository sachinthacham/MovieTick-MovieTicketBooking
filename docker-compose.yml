version: "3.9"

services:

  # ─── SQL Server ──────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: moviebooking-db
    environment:
      SA_PASSWORD: "YourStrong@Pass123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Pass123' -Q 'SELECT 1' -No || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Pass123' -Q 'SELECT 1'",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend/MovieTicketBooking
      dockerfile: Dockerfile
    container_name: moviebooking-api
    ports:
      - "5000:8080"
    env_file:
      - ./backend/MovieTicketBooking/MovieBooking.Api/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=MovieBookingDB;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=True
      - Jwt__Key=MY_SUPER_SECURE_MOVIE_BOOKING_APP_SECRET_KEY_2026
      - Frontend__BaseUrl=http://localhost:3000
      - Booking__LockDurationMinutes=10
      - Booking__ExpiryMinutes=15
    volumes:
      - api_uploads:/app/wwwroot/uploads
      - api_logs:/app/logs
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser-facing URL — must use the HOST port (5000) not the container port
        NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    container_name: moviebooking-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    restart: on-failure

volumes:
  sqlserver_data:
  api_uploads:
  api_logs:
